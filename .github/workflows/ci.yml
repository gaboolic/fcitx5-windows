name: CI

on:
  push:
    branches:
      - '*'
    tags:
      - '[0-9]+.*'
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format 21
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          wget https://apt.llvm.org/llvm-snapshot.gpg.key
          sudo gpg --dearmor < llvm-snapshot.gpg.key > /usr/share/keyrings/llvm-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg] http://apt.llvm.org/jammy/ llvm-toolchain-jammy-21 main" | sudo tee /etc/apt/sources.list.d/llvm-toolchain-jammy-21.list
          sudo apt-get update
          sudo apt-get install -y clang-format-21
          sudo ln -sf /usr/bin/clang-format-21 /usr/local/bin/clang-format
          clang-format --version

      - name: Code style lint
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: |
          set -e
          git ls-files -- '*.cpp' '*.h' | while IFS= read -r f; do
            [ -z "$f" ] && continue
            clang-format -Werror --dry-run "$f"
          done

  build-fcitx5-msys:
    needs: lint
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          C:/msys64/usr/bin/pacman -Syu --noconfirm
          C:/msys64/usr/bin/pacman -S --noconfirm `
            mingw-w64-clang-x86_64-clang `
            mingw-w64-clang-x86_64-cmake `
            mingw-w64-clang-x86_64-ninja `
            mingw-w64-clang-x86_64-extra-cmake-modules `
            mingw-w64-clang-x86_64-libuv `
            mingw-w64-clang-x86_64-dlfcn `
            mingw-w64-clang-x86_64-pkgconf `
            mingw-w64-clang-x86_64-gettext-tools `
            gettext-devel `
            msys2-runtime-devel
          cp -r windows-cross/its C:/msys64/usr/share/gettext
          Add-Content $env:GITHUB_PATH "C:/msys64/clang64/bin"
          Add-Content $env:GITHUB_PATH "C:/msys64/usr/bin"

      - name: Install ImageMagick (win32 penguin.ico)
        run: choco install imagemagick -y --no-progress

      - name: Build (compile only, no install / installer)
        shell: pwsh
        env:
          CLANG64: C:/msys64/clang64
        run: |
          $ErrorActionPreference = 'Stop'
          $env:PATH = "$env:CLANG64/bin;C:/msys64/usr/bin;$env:PATH"
          $root = $env:GITHUB_WORKSPACE
          cmake -S $root -B (Join-Path $root 'build') -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            "-DCMAKE_C_COMPILER=$env:CLANG64/bin/clang.exe" `
            "-DCMAKE_CXX_COMPILER=$env:CLANG64/bin/clang++.exe" `
            -DFCITX5_WINDOWS_BUILD_WIN32_IME=ON
          cmake --build (Join-Path $root 'build')

  # Installer must include libime + fcitx5-chinese-addons (libpinyin.dll on MinGW; pinyin.dll on some MSVC layouts). _compile-build-portable.ps1
  # alone only installs fcitx5 core from this repo — same as a clean clone, Chinese IME will not work.
  # This job runs scripts/build-pinyin-stage.sh (see docs/PINYIN_WINDOWS.md, installer/README.txt).
  package-fcitx5-tsf-installer:
    needs: lint
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (CLANG64 + Boost for libime)
        run: |
          C:/msys64/usr/bin/pacman -Syu --noconfirm
          C:/msys64/usr/bin/pacman -S --noconfirm `
            mingw-w64-clang-x86_64-boost `
            mingw-w64-clang-x86_64-clang `
            mingw-w64-clang-x86_64-cmake `
            mingw-w64-clang-x86_64-ninja `
            mingw-w64-clang-x86_64-extra-cmake-modules `
            mingw-w64-clang-x86_64-libuv `
            mingw-w64-clang-x86_64-zstd `
            mingw-w64-clang-x86_64-dlfcn `
            mingw-w64-clang-x86_64-pkgconf `
            mingw-w64-clang-x86_64-gettext-tools `
            gettext-devel `
            msys2-runtime-devel `
            perl
          cp -r windows-cross/its C:/msys64/usr/share/gettext
          Add-Content $env:GITHUB_PATH "C:/msys64/clang64/bin"
          Add-Content $env:GITHUB_PATH "C:/msys64/usr/bin"

      - name: Install ImageMagick (win32 penguin.ico)
        run: choco install imagemagick -y --no-progress

      - name: Install Inno Setup 6
        run: choco install innosetup -y --no-progress

      - name: Clone libime and fcitx5-chinese-addons
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root = $env:GITHUB_WORKSPACE
          $libime = Join-Path $root 'libime'
          $chinese = Join-Path $root 'fcitx5-chinese-addons'
          if (Test-Path -LiteralPath $libime) { Remove-Item -LiteralPath $libime -Recurse -Force }
          if (Test-Path -LiteralPath $chinese) { Remove-Item -LiteralPath $chinese -Recurse -Force }
          git clone --depth 1 https://github.com/fcitx/libime.git $libime
          git clone --depth 1 https://github.com/fcitx/fcitx5-chinese-addons.git $chinese
          Push-Location $libime
          try {
            git submodule update --init --recursive
          } finally {
            Pop-Location
          }

      - name: Build stage (build-pinyin-stage.sh → stage-installer)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $cygpath = 'C:/msys64/usr/bin/cygpath.exe'
          if (-not (Test-Path -LiteralPath $cygpath)) {
            Write-Error "cygpath not found: $cygpath"
          }
          $wsUnix = (& $cygpath -u $env:GITHUB_WORKSPACE).Trim()
          $env:CI_WS_UNIX = $wsUnix
          $runnerSh = Join-Path $env:RUNNER_TEMP 'ci-pinyin-stage.sh'
          $bashLines = @(
            'set -euo pipefail',
            'export PATH="/clang64/bin:/usr/bin:$PATH"',
            'export MSYSTEM=CLANG64',
            'cd "$CI_WS_UNIX"',
            'export STAGE="$CI_WS_UNIX/stage-installer"',
            'export FCITX_BUILD="$CI_WS_UNIX/build-portable-ci"',
            'export LIBIME_SRC="$CI_WS_UNIX/libime"',
            'export CHINESE_SRC="$CI_WS_UNIX/fcitx5-chinese-addons"',
            'export LIBIME_BUILD=/tmp/fcitx5-pinyin-libime',
            'export CHINESE_BUILD=/tmp/fcitx5-pinyin-chinese',
            'export CMAKE_BUILD_TYPE=Release',
            'export JOBS=8',
            'exec ./scripts/build-pinyin-stage.sh \',
            '  -DCMAKE_C_COMPILER=/clang64/bin/clang.exe \',
            '  -DCMAKE_CXX_COMPILER=/clang64/bin/clang++.exe'
          )
          $utf8NoBom = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::WriteAllText($runnerSh, (($bashLines -join "`n") + "`n"), $utf8NoBom)
          & C:/msys64/usr/bin/bash.exe -e $runnerSh
          $stage = Join-Path $env:GITHUB_WORKSPACE 'stage-installer'
          $addonDir = Join-Path $stage 'lib\fcitx5'
          $pinyinDll = Join-Path $addonDir 'libpinyin.dll'
          $pinyinDllAlt = Join-Path $addonDir 'pinyin.dll'
          if (-not (Test-Path -LiteralPath $pinyinDll) -and -not (Test-Path -LiteralPath $pinyinDllAlt)) {
            Write-Host '--- lib/fcitx5 ---'
            Get-ChildItem -LiteralPath $addonDir -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName }
            Write-Host '--- *pinyin*.dll under stage-installer ---'
            Get-ChildItem -LiteralPath $stage -Recurse -Filter '*pinyin*.dll' -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName }
            Write-Error 'stage-installer/lib/fcitx5/libpinyin.dll (or pinyin.dll) missing — see listing above. On MSYS2 the addon is almost always libpinyin.dll (not pinyin.dll); an older workflow that only checked pinyin.dll would fail spuriously.'
          }

      - name: Build TSF installer (fcitx5-windows-setup.exe)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & (Join-Path $env:GITHUB_WORKSPACE 'installer/build-installer.ps1') `
            -StageDir (Join-Path $env:GITHUB_WORKSPACE 'stage-installer')

      - name: Upload TSF installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: fcitx5-windows-setup
          path: installer/dist/fcitx5-windows-setup.exe

  build-fcitx5-clang:
    needs: lint
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, arm64]
        include:
          - { arch: x86_64, cmake_arch: AMD64, pkg_arch: x86_64  }
          - { arch: arm64, cmake_arch: ARM64, pkg_arch: aarch64 }

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          C:/msys64/usr/bin/pacman -Syu --noconfirm
          C:/msys64/usr/bin/pacman -S --noconfirm `
            mingw-w64-clang-${{ matrix.pkg_arch }}-extra-cmake-modules `
            mingw-w64-clang-${{ matrix.pkg_arch }}-dlfcn `
            mingw-w64-clang-${{ matrix.pkg_arch }}-libuv `
            mingw-w64-clang-x86_64-clang `
            mingw-w64-clang-x86_64-cmake `
            mingw-w64-clang-x86_64-ninja `
            mingw-w64-clang-x86_64-pkgconf `
            mingw-w64-clang-x86_64-gettext-tools
          if ("${{ matrix.arch }}" -eq "arm64") {
            C:/msys64/usr/bin/pacman -S --noconfirm `
              mingw-w64-clang-aarch64-clang
          }
          Add-Content $env:GITHUB_PATH "C:/msys64/clang64/bin"

      - name: Build
        run: |
          cmake -B build/${{ matrix.arch }} -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE='windows-cross/msys2.toolchain.cmake' `
            -DARCH=${{ matrix.cmake_arch }}
          cmake --build build/${{ matrix.arch }}

      - name: Package
        env:
          DESTDIR: dist/${{ matrix.arch }}
        run: |
          cmake --install build/${{ matrix.arch }}
          cd dist/${{ matrix.arch }} && tar cjf ../Fcitx5-${{ matrix.arch }}-dev.tar.bz2 bin/lib* include lib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fcitx5-${{ matrix.arch }}
          path: |
            dist/Fcitx5-${{ matrix.arch }}*.tar.bz2

  build-win32:
    needs: lint
    runs-on: windows-2025
    defaults:
      run:
        working-directory: win32
    steps:
      - name: Disable CRLF
        working-directory: .
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v4

      - name: Validate PowerShell scripts
        working-directory: .
        shell: pwsh
        run: ./scripts/validate-powershell-scripts.ps1

      - name: Install ImageMagick (penguin.ico)
        run: choco install imagemagick -y --no-progress

      - name: Build
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  release:
    needs:
      - build-fcitx5-clang
      - build-fcitx5-msys
      - package-fcitx5-tsf-installer
    if: ${{ github.ref == 'refs/heads/master' && !contains(github.event.head_commit.message, '!release') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find "${GITHUB_WORKSPACE}" -type f -name 'fcitx5-windows-setup.exe' -exec cp -f {} release-assets/ \;
          ls -la release-assets/

      - name: Create Nightly release
        uses: 'marvinpinto/action-automatic-releases@latest'
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          automatic_release_tag: latest
          prerelease: true
          title: "Nightly Build"
          files: |
            release-assets/*
